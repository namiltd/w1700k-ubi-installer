name: W1700k UBI Installer

on:
  workflow_dispatch:

env:
  REMOTE_REPOSITORY: hurrian/openwrt-w1700k
  REMOTE_BRANCH: xr1710g-plus
  TARGET_SUBTARGET: airoha/an7581
  INNER_CONFIG: configs/build.config
  OUTER_CONFIG: configs/minimal.config
  RECOVERY_W1700K: openwrt-airoha-an7581-gemtek_w1700k-ubi-initramfs-recovery.itb
  SYSUPGRADE_W1700K: openwrt-airoha-an7581-gemtek_w1700k-ubi-squashfs-sysupgrade.itb
  INSTALLER_W1700K: openwrt-airoha-an7581-gemtek_w1700k-ubi-initramfs-installer.itb
  UBOOT_W1700K: openwrt-airoha-an7581-gemtek_w1700k-ubi-chainload-uboot.itb
  RECOVERY_XR1710G: openwrt-airoha-an7581-gemtek_xr1710g-ubi-initramfs-recovery.itb
  SYSUPGRADE_XR1710G: openwrt-airoha-an7581-gemtek_xr1710g-ubi-squashfs-sysupgrade.itb
  INSTALLER_XR1710G: openwrt-airoha-an7581-gemtek_xr1710g-ubi-initramfs-installer.itb
  UBOOT_XR1710G: openwrt-airoha-an7581-gemtek_xr1710g-ubi-chainload-uboot.itb

jobs:
  check_commits:
    name: Check Commits
    runs-on: ubuntu-24.04
    outputs:
      latest_commit_sha: ${{ steps.get_sha.outputs.latest_commit_sha }}
    steps:
      - name: Checkout remote repository
        uses: actions/checkout@main
        with:
          repository: ${{ env.REMOTE_REPOSITORY }}
          ref: ${{ env.REMOTE_BRANCH }}

      - name: Get the latest commit SHA
        id: get_sha
        run: |
          echo "latest_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "latest_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build OpenWrt installer images
    needs: [check_commits]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout installer repository
        uses: actions/checkout@main
        with:
          path: installer-repo

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt upgrade -y
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget curl

      - name: Checkout OpenWrt repository
        uses: actions/checkout@main
        with:
          repository: ${{ env.REMOTE_REPOSITORY }}
          ref: ${{ env.REMOTE_BRANCH }}
          path: openwrt
          fetch-depth: 0

      - name: Use Github feeds
        run: |
          cd openwrt
          sed -i \
            -e 's#https://git.openwrt.org/feed/#https://github.com/openwrt/#g' \
            -e 's#https://git.openwrt.org/project/#https://github.com/openwrt/#g' \
            feeds.conf.default

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare config (inner build)
        run: |
          cd openwrt
          cp "../installer-repo/${{ env.INNER_CONFIG }}" .config
          make defconfig

      - name: Build OpenWrt images (inner build)
        run: |
          cd openwrt
          make -j"$(nproc)" defconfig download world

      - name: Prepare config (outer build)
        run: |
          cd openwrt
          cp "../installer-repo/${{ env.OUTER_CONFIG }}" .config
          make defconfig

      - name: Stage installer assets and add installer files (W1700K outer build)
        run: |
          cd openwrt
          mkdir -p files/installer
          cp "bin/targets/${{ env.TARGET_SUBTARGET }}/${{ env.RECOVERY_W1700K }}" "files/installer/"
          cp "bin/targets/${{ env.TARGET_SUBTARGET }}/${{ env.SYSUPGRADE_W1700K }}" "files/installer/"
          rsync -a ../installer-repo/files.w1700k/ files/
          chmod +x \
            files/installer/install.sh \
            files/lib/preinit/00_installer

      - name: Rebuild images with installer payload (W1700K outer build)
        run: |
          cd openwrt
          make -j"$(nproc)"

      - name: Stage installer assets and add installer files (XR1710G outer build)
        run: |
          cd openwrt
          mkdir -p files/installer
          cp "bin/targets/${{ env.TARGET_SUBTARGET }}/${{ env.RECOVERY_XR1710G }}" "files/installer/"
          cp "bin/targets/${{ env.TARGET_SUBTARGET }}/${{ env.SYSUPGRADE_XR1710G }}" "files/installer/"
          rsync -a ../installer-repo/files.xr1710g/ files/
          chmod +x \
            files/installer/install.sh \
            files/lib/preinit/00_installer

      - name: Rebuild images with installer payload (XR1710G outer build)
        run: |
          cd openwrt
          make -j"$(nproc)"

      - name: Collect artifacts
        run: |
          mkdir -p output/installer
          cp "openwrt/bin/targets/${{ env.TARGET_SUBTARGET }}/${{ env.RECOVERY_W1700K }}" "output/installer/${{ env.INSTALLER_W1700K }}"
          cp "openwrt/bin/targets/${{ env.TARGET_SUBTARGET }}/${{ env.UBOOT_W1700K }}" "output/installer/"
          cp "openwrt/bin/targets/${{ env.TARGET_SUBTARGET }}/${{ env.RECOVERY_XR1710G }}" "output/installer/${{ env.INSTALLER_XR1710G }}"
          cp "openwrt/bin/targets/${{ env.TARGET_SUBTARGET }}/${{ env.UBOOT_XR1710G }}" "output/installer/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: w1700k-installer
          path: |
            output/installer/${{ env.INSTALLER_W1700K }}
            output/installer/${{ env.UBOOT_W1700K }}
            output/installer/${{ env.INSTALLER_XR1710G }}
            output/installer/${{ env.UBOOT_XR1710G }}
